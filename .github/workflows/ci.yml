name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest-cov

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy core/ api/ --ignore-missing-imports --strict

      - name: Run tests with coverage
        env:
          GROQ_API_KEY: dummy-key-for-ci
          ENVIRONMENT: development
        run: |
          pytest --cov=core --cov=api --cov-report=term-missing --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: .coverage

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t VectraCore RAG:ci .

      - name: Smoke test container
        run: |
          docker run -d \
            --name VectraCore RAG-ci \
            -p 8000:8000 \
            -e GROQ_API_KEY=dummy \
            -e ENVIRONMENT=development \
            VectraCore RAG:ci
          sleep 15
          curl --fail http://localhost:8000/ || (docker logs VectraCore RAG-ci && exit 1)
          docker stop VectraCore RAG-ci
