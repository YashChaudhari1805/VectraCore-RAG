services:
  - type: web
    name: VectraCoreRAG-ai-engine
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: API_KEYS
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: RATE_LIMIT_PER_MINUTE
        value: "30"
      - key: MEMORY_DIR
        value: /tmp/vectracore_memory
