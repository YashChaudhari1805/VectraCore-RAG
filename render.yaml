services:
  - type: web
    name: VectraCoreRAG-ai-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: NEWS_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: API_KEYS
        sync: false          # comma-separated: key1,key2
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
      - key: ALLOWED_ORIGINS
        value: "*"           # update to your render domain after deploy
      - key: RATE_LIMIT_PER_MINUTE
        value: "30"
      - key: MEMORY_DIR
        value: /tmp/VectraCore RAG_memory   # Render free tier has no persistent disk
    disk:
      name: VectraCore RAG-memory
      mountPath: /app/data/memory
      sizeGB: 1
